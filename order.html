<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление абонемента | ФК Юниор</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .order-box {
            background: #0d1527;
            border: 2px solid #0052cc;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0, 102, 255, 0.2);
        }

        h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #0066ff;
            text-align: center;
            font-size: 24px;
        }

        .price-info {
            text-align: center;
            background: rgba(0, 102, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #8fa0c0;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #02040a;
            border: 1px solid #0052cc;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #0066ff;
        }

        .btn {
            background: #0066ff;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0052cc;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #8fa0c0;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #0066ff;
        }
    </style>
</head>
<body>

    <div class="order-box">
        <h2>Оформление покупки</h2>
        <div class="price-info">К оплате: 3 000 ₽</div>
        
        <form id="payForm">
            <div class="form-group">
                <label for="fio">ФИО владельца абонемента:</label>
                <input type="text" id="fio" required placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
                <label for="phone">Номер телефона:</label>
                <input type="tel" id="phone" required placeholder="+7 (999) 000-00-00">
            </div>
            <div class="form-group">
                <label for="email">Электронная почта:</label>
                <input type="email" id="email" required placeholder="example@mail.ru">
            </div>
            <button type="submit" class="btn">Перейти к оплате</button>
        </form>

        <a href="index.html" class="back-link">← Вернуться назад</a>
    </div>

    <script>
        document.getElementById('payForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Система перенаправления: Данные приняты! (Здесь открывался бы шлюз банка для оплаты)');
        });
    </script>

</body>
</html>
