<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юниор</title>
    <style>
        /* Сброс стандартных отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Настройка экрана */
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #000;
        }

        /* Главный контейнер */
        .cinema-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Киношный задний фон: размазанный и расплывчатый */
        .cinema-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            /* Абстрактный темный фон для кино-эффекта, пока ты не вставишь свое фото */
            background: radial-gradient(circle, #2c3e50, #000000);
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.5); /* Сильное размытие и затемнение */
            z-index: 1;
        }

        /* Новая красная надпись ЮНИОР */
        .club-title {
            position: relative;
            z-index: 2;
            color: #ff0000; /* Чистый красный цвет */
            font-size: 5rem; /* Крупный размер */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Эффект свечения букв в темноте кинозала */
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7), 
                         0 0 40px rgba(255, 0, 0, 0.4);
            animation: cinematic-glow 3s ease-in-out infinite alternate;
        }

        /* Легкое мерцание для кино-атмосферы */
        @keyframes cinematic-glow {
            from { opacity: 0.9; text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
            to { opacity: 1; text-shadow: 0 0 35px rgba(255, 0, 0, 0.9); }
        }
    </style>
</head>
<body>

    <div class="cinema-container">
        <!-- Задний фон -->
        <div class="cinema-bg"></div>
        
        <!-- Измененная надпись -->
        <h1 class="club-title">ЮНИОР</h1>
    </div>

</body>
</html>
