<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СК Юниор | Спортивный Клуб</title>
    <style>
        /* Фирменная палитра ФК Краснодар */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #070a08; /* Глубокий черно-зеленый базовый фон */
            color: #ffffff;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: 4px solid #0f1611; /* Строгая темная рамка по периметру сайта */
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .site-name {
            font-size: 22px;
            font-weight: 900;
            color: #2ecc71; /* Фирменный ярко-зеленый акцент */
            letter-spacing: 2px;
            display: inline-block;
            text-transform: uppercase;
        }

        /* КИНОШНЫЙ БАННЕР С ЭФФЕКТОМ РАЗМЫТИЯ И ТЕМНО-ЗЕЛЕНЫМ ОТТЕНКОМ */
        .main-banner {
            background: rgba(15, 22, 17, 0.6); /* Полупрозрачная подложка */
            backdrop-filter: blur(15px); /* Киношное размытие заднего фона */
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid #2ecc71; /* Тонкая зеленая рамка в стиле Краснодара */
            padding: 50px 20px;
            border-radius: 4px; /* Строгие, почти прямые углы */
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        /* КРАСНЫЙ КИНЕМАТОГРАФИЧЕСКИЙ ЗАГОЛОВОК ЮНИОР */
        .main-banner h1 {
            margin: 0;
            font-size: 52px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 900;
            color: #ff0000; /* Чистый ярко-красный цвет */
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7); /* Эффект свечения */
        }

        .section-title {
            font-size: 18px;
            color: #ffffff;
            border-left: 4px solid #2ecc71; /* Зеленый маркер секции */
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* СЕТКА ДЛЯ ФОТО И КАРТОЧЕК */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        /* Минималистичные карточки в стиле fckrasnodar.ru */
        .club-img {
            background: #0f1611;
            border: 1px solid #1b261e;
            border-radius: 4px;
            height: 200px;
            width: 100%;
            object-fit: cover;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .trainer-card {
            background: #0f1611;
            border: 1px solid #1b261e;
            border-radius: 4px;
            width: 100%;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a5b1a9;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* Стильный белый кант и зеленая тень при наведении */
        .club-img:hover, .trainer-card:hover {
            transform: translateY(-4px);
            border-color: #ffffff;
            color: #ffffff;
            background: #141e17;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.25);
        }

        /* Футер */
        .footer-info {
            background: #0f1611;
            border: 1px solid #1b261e;
            border-radius: 4px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .contact-row {
            margin-bottom: 20px;
            font-size: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(46, 204, 113, 0.1);
        }

        .contact-row strong {
            color: #2ecc71; /* Зеленый текст для акцентов */
            letter-spacing: 0.5px;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        /* Кнопки копирования */
        .copy-btn {
            background: #141e17;
            border: 1px solid #2ecc71;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #2ecc71;
            color: #070a08; /* При наведении текст становится темным */
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        /* Всплывающее уведомление */
        .toast {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #2ecc71;
            color: #070a08;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="site-name">unior</div>
        </header>

        <!-- Размытый баннер в стиле Краснодара с красным «ЮНИОР» -->
        <div class="main-banner">
            <h1>юниор</h1>
        </div>

        <section>
            <h2 class="section-title">Фотографии клуба</h2>
            <div class="photo-grid">
                <img src="hoto.png" alt="Фото клуба 1" class="club-img">
                <img src="hoto2.png" alt="Фото клуба 2" class="club-img">
                <img src="hoto3.png" alt="Фото клуба 3" class="club-img">
                <img src="hoto4.png" alt="Фото клуба 4" class="club-img">
                <img src="hoto5.png" alt="Фото клуба 5" class="club-img">
                <img src="hoto6.png" alt="Фото клуба 6" class="club-img">
            </div>
        </section>

        <section>
            <h2 class="section-title">Наши тренеры</h2>
            <div class="photo-grid">
                <div class="trainer-card">Фотография тренера 1</div>
                <div class="trainer-card">Фотография тренера 2</div>
            </div>
        </section>

        <div class="footer-info">
            <div class="contact-row">
                <strong>Заказать абонемент по номеру:</strong> +7 (999) 123-45-67
            </div>

            <div class="contact-row">
                <strong>Наши соцсети (нажмите для копирования):</strong>
                <div class="social-buttons">
                    <button class="copy-btn" data-copy="https://vk.com">ВКонтакте</button>
                    <button class="copy-btn" data-copy="@unior_telegram">Telegram</button>
                </div>
            </div>

            <div class="contact-row" style="border: none; margin: 0; padding: 0;">
                <strong>Адрес клуба:</strong> г. Москва, ул. Спортивная, д. 11, комплекс «Юниор»
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Ссылка скопирована!</div>

    <script>
        const copyButtons = document.querySelectorAll('.copy-btn');
        const toast = document.getElementById('toast');

        copyButtons.forEach(button => {
            button.addEventListener('click', () => {
                const textToCopy = button.getAttribute('data-copy');
                navigator.clipboard.writeText(textToCopy).then(() => {
                    toast.style.display = 'block';
                    setTimeout(() => {
                        toast.style.display = 'none';
                    }, 2000);
                });
            });
        });
    </script>

</body>
</html>
