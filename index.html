<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СК Юниор | Спортивный Клуб</title>
    <!-- Подключаем фирменный узкий футбольный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Сброс отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Oswald', 'Segoe UI', Arial, sans-serif;
            background-color: #1a222d; /* Графитовый серый фон */
            color: #ffffff;
            min-height: 100vh;
            /* Текстура фирменных ромбов сайта Краснодара */
            background-image: 
                linear-gradient(30deg, #242f3e 12%, transparent 12.5%, transparent 87%, #242f3e 87.5%, #242f3e),
                linear-gradient(150deg, #242f3e 12%, transparent 12.5%, transparent 87%, #242f3e 87.5%, #242f3e),
                linear-gradient(30deg, #242f3e 12%, transparent 12.5%, transparent 87%, #242f3e 87.5%, #242f3e),
                linear-gradient(150deg, #242f3e 12%, transparent 12.5%, transparent 87%, #242f3e 87.5%, #242f3e),
                linear-gradient(60deg, rgba(36,47,62,0.5) 25%, transparent 25.5%, transparent 75%, rgba(36,47,62,0.5) 75.5%, rgba(36,47,62,0.5)),
                linear-gradient(60deg, rgba(36,47,62,0.5) 25%, transparent 25.5%, transparent 75%, rgba(36,47,62,0.5) 75.5%, rgba(36,47,62,0.5));
            background-size: 40px 70px;
            background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ШАПКА: КНОПКИ В СТРОГОМ ПОРЯДКЕ */
        header {
            padding: 25px 0;
            border-bottom: 1px solid rgba(0, 162, 255, 0.3);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .site-name {
            font-size: 20px;
            font-weight: 800;
            color: #00a2ff; 
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Блок навигации */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Кнопка "О клубе" идет первой */
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px 24px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }

        /* Кнопка информации */
        .info-btn-top {
            background: #00a2ff; 
            border: 1px solid #00a2ff;
            color: #ffffff;
            padding: 12px 28px; 
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px; 
            letter-spacing: 1.5px;
            text-decoration: none; 
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .info-btn-top:hover {
            background: #ffffff;
            color: #1a222d;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }

        /* СВЕТЛЫЙ КИНЕМАТОГРАФИЧЕСКИЙ БАННЕР С ЭФФЕКТОМ РАЗМЫТИЯ */
        .main-banner {
            position: relative;
            background: rgba(26, 34, 45, 0.5); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 162, 255, 0.4); 
            padding: 85px 20px;
            text-align: center;
            margin-bottom: 60px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .main-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00a2ff, transparent);
        }

        /* КРАСНЫЙ ЗАГОЛОВОК ЮНИОР */
        .main-banner h1 {
            margin: 0;
            font-size: 75px;
            text-transform: uppercase;
            letter-spacing: 14px;
            font-weight: 900;
            color: #ff0000; 
            text-shadow: 0 0 25px rgba(255, 0, 0, 0.9), 
                         0 0 50px rgba(255, 0, 0, 0.5);
        }

        /* Заголовки секций */
        .section-title {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 45px;
            height: 3px;
            background: #00a2ff; 
            margin-top: 10px;
        }

        /* СЕТКА ФОТОГРАФИЙ (УВЕЛИЧЕНА) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Уменьшил minmax для вместимости большего кол-ва фото */
            gap: 2px;
            background: rgba(0, 162, 255, 0.3); 
            padding: 2px;
            margin-bottom: 60px;
        }

        .club-img {
            height: 250px; /* Чуть меньше высота чтобы влезло больше */
            width: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.95); 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .trainer-card {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            color: #ffffff;
            font-weight: 700;
            text-align: center;
            padding: 25px 15px;
            box-sizing: border-box;
            text-transform: uppercase;
            font-size: 16px; /* Чуть крупнее имя */
            letter-spacing: 2px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: linear-gradient(to top, #1a222d 25%, rgba(36, 47, 62, 0.6));
            border: 1px solid rgba(0, 162, 255, 0.2);
        }

        .club-img:hover {
            filter: brightness(1.15);
            transform: scale(1.02);
            z-index: 5;
        }

        .trainer-card:hover {
            background: linear-gradient(to top, #00a2ff 15%, #1a222d); 
            color: #ffffff;
            transform: scale(1.02);
            z-index: 5;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        /* Секция тренеров */
        .trainers-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .trainer-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            margin-bottom: 0;
            filter: grayscale(20%);
            transition: 0.3s;
        }

        .trainer-card:hover .trainer-photo {
            filter: grayscale(0%);
        }

        /* ФУТЕР */
        .footer-info {
            background: #242f3e; 
            border-top: 3px solid #00a2ff;
            padding: 45px;
            margin-top: 60px;
            margin-bottom: 40px;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .contact-row {
            margin-bottom: 25px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #cbd5e0; 
        }

        .contact-row strong {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #00a2ff; 
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 25px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid rgba(0, 162, 255, 0.5);
            color: #ffffff;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            min-width: 160px;
        }

        .copy-btn:hover {
            background: #ffffff;
            color: #1a222d;
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        /* Уведомление о копировании */
        .toast {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00a2ff;
            color: #ffffff;
            padding: 15px 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            z-index: 10000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
            }
            .main-banner h1 {
                font-size: 40px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="site-name">unior fC</div>
            <div class="top-nav">
                <button class="nav-btn">О клубе</button>
                <a href="tel:+79991234567" class="info-btn-top">Узнать информацию по номеру</a>
            </div>
        </header>

        <!-- Главный баннер с кино-размытием -->
        <div class="main-banner">
            <h1>юниор</h1>
        </div>

        <section>
            <h2 class="section-title">Фотографии клуба</h2>
            <!-- Добавлено больше фотографий -->
            <div class="photo-grid">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Match+Day" alt="Фото клуба 1" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Training" alt="Фото клуба 2" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Victory" alt="Фото клуба 3" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Team" alt="Фото клуба 4" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Away+Game" alt="Фото клуба 5" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Stadium" alt="Фото клуба 6" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Fans" alt="Фото клуба 7" class="club-img">
                <img src="https://placehold.co/600x400/1a222d/FFF?text=Trophy" alt="Фото клуба 8" class="club-img">
            </div>
        </section>

        <!-- СЕКЦИЯ ТРЕНЕРОВ -->
        <section>
            <h2 class="section-title">Тренерский штаб</h2>
            <div class="trainers-section">
                
                <!-- Тренер 1: Руслан Атаев -->
                <div class="trainer-card">
                    <img src="https://placehold.co/400x500/242f3e/FFF?text=Ruslan+Ataev" alt="Руслан Атаев" class="trainer-photo" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;">
                    <div style="background: rgba(0,0,0,0.7); width: 100%; padding: 15px;">
                        Руслан Атаев
                    </div>
                </div>

                <!-- Тренер 2: Дмитрий Меньшиков -->
                <div class="trainer-card">
                    <img src="https://placehold.co/400x500/242f3e/FFF?text=Dmitry+Menshikov" alt="Дмитрий Меньшиков" class="trainer-photo" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;">
                    <div style="background: rgba(0,0,0,0.7); width: 100%; padding: 15px;">
                        Дмитрий Меньшиков
                    </div>
                </div>

            </div>
        </section>

        <!-- ФУТЕР С СОЦСЕТЯМИ -->
        <div class="footer-info">
            <div class="contact-row">
                <strong>Адрес клуба</strong>
                г. Москва, ул. Спортивная, д. 10
            </div>
            
            <div class="contact-row">
                <strong>Наши социальные сети</strong>
                <p style="font-size: 11px; margin-bottom: 15px; opacity: 0.7;">Нажмите на кнопку, чтобы скопировать ссылку</p>
                
                <div class="social-buttons">
                    <button class="copy-btn" onclick="copyToClipboard('https://vk.com/fc_unior')">VKontakte</button>
                    <button class="copy-btn" onclick="copyToClipboard('https://t.me/fc_unior_channel')">Telegram</button>
                    <button class="copy-btn" onclick="copyToClipboard('https://instagram.com/fc_unior_official')">Instagram</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Уведомление -->
    <div id="toast" class="toast">Ссылка скопирована!</div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                
                // Скрыть через 2 секунды
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            }, function(err) {
                console.error('Ошибка копирования: ', err);
            });
        }
    </script>
</body>
</html>
