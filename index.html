<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФК Юниор | Официальный сайт</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #02040a 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
        }

        .subtitle {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #0066ff;
            margin-top: 5px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .ticket-card {
            background: linear-gradient(145deg, #0d1527, #070a14);
            border: 2px solid #0052cc;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 102, 255, 0.2);
            margin-bottom: 40px;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .ticket-card:hover {
            transform: translateY(-5px);
            border-color: #0066ff;
            box-shadow: 0 20px 40px rgba(0, 102, 255, 0.4);
        }

        .ticket-card h3 {
            margin: 0 0 15px 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            font-size: 42px;
            font-weight: 800;
            color: #0066ff;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 102, 255, 0.3);
        }

        .info-block {
            font-size: 16px;
            color: #8fa0c0;
            line-height: 1.8;
            border-top: 1px solid rgba(0, 102, 255, 0.2);
            padding-top: 25px;
        }

        .info-block strong {
            color: #ffffff;
        }

        .football-animation {
            display: none;
            position: fixed;
            font-size: 60px;
            left: -100px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
            pointer-events: none;
        }

        @keyframes kickBall {
            0% { left: -100px; transform: translateY(-50%) rotate(0deg) scale(0.5); }
            50% { transform: translateY(-120%) rotate(360deg) scale(1.5); }
            100% { left: 110vw; transform: translateY(-50%) rotate(720deg) scale(0.5); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Юниор</h1>
        <div class="subtitle">футбольный клуб</div>

        <div class="ticket-card" id="buyTicket">
            <h3>Стоимость абонемента</h3>
            <p class="price">3 000 ₽</p>
            <p style="color: #657795; margin: 10px 0 0 0; font-size: 14px;">Нажмите для оформления</p>
        </div>

        <div class="info-block">
            <p><strong>Адрес базы:</strong> г. Москва, ул. Спортивная, д. 11, стадион «Юниор Арена»</p>
            <p><strong>Горячая линия:</strong> 8 (800) 555-35-35 (Звонок бесплатный)</p>
        </div>
    </div>

    <div class="football-animation" id="ball">⚽</div>

    <script>
        const card = document.getElementById('buyTicket');
        const ball = document.getElementById('ball');

        card.addEventListener('click', () => {
            ball.style.display = 'block';
            ball.style.animation = 'kickBall 1.2s forwards ease-in-out';

            setTimeout(() => {
                window.location.href = 'order.html';
            }, 1200);
        });
    </script>

</body>
</html>
