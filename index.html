 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СК Юниор | Спортивный Клуб</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #002266;
            color: #ffffff;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: 3px solid #0066ff;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .site-name {
            font-size: 24px;
            font-weight: bold;
            color: #0088ff;
            letter-spacing: 1px;
            display: inline-block;
        }

        .main-banner {
            background: #001a4d; 
            border: 3px solid #0066ff;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .main-banner h1 {
            margin: 0;
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
        }

        .section-title {
            font-size: 22px;
            color: #ffffff;
            border-left: 5px solid #0066ff;
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* СТИЛИ ДЛЯ АВТО-СЛАЙДЕРА (КАРУСЕЛИ) */
        .slider-container {
            position: relative;
            max-width: 100%;
            height: 400px; /* Высота главного слайдера */
            margin-bottom: 50px;
            overflow: hidden;
            border: 2px solid #0044cc;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .slider-track {
            display: flex;
            width: 600%; /* 6 слайдов по 100% ширины каждый */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Плавная анимация перемещения */
        }

        .slide {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Кнопки-стрелочки */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 26, 77, 0.7);
            border: 2px solid #0066ff;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .slider-btn:hover {
            background: #0066ff;
            box-shadow: 0 0 15px #0066ff;
        }

        .slider-btn.prev { left: 20px; }
        .slider-btn.next { right: 20px; }

        /* Навигационные точки внизу слайдера */
        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .dot.active {
            background: #0088ff;
            box-shadow: 0 0 8px #0088ff;
        }

        /* Сетка для тренеров (3:4) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .trainer-card {
            background: #001a4d;
            border: 2px solid #0044cc;
            border-radius: 8px;
            width: 100%;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0088ff;
            font-weight: 500;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .trainer-card:hover {
            transform: translateY(-5px);
            border-color: #ffffff;
            color: #ffffff;
            background: #002266;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.5);
        }

        .footer-info {
            background: #001a4d;
            border: 2px solid #0066ff;
            border-radius: 12px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .contact-row {
            margin-bottom: 20px;
            font-size: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
        }

        .contact-row strong {
            color: #0088ff;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .copy-btn {
            background: #002266;
            border: 1px solid #0066ff;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #0066ff;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.5);
        }

        .toast {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0066ff;
            color: #001a4d;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.5);
            z-index: 10000;
        }
    </style>
</head>
<body>

        </div>

    </div>
